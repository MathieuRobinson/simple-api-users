name: Dockerhub CI

on:
  push:
    branches: [ main ]
    runs-on: ubuntu-latest
jobs:
  build and push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - name: Install dependencies
        run: npm install